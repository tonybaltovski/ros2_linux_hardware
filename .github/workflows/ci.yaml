name: ci

on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  schedule:
    - cron: "0 0 * * *" # every day at midnight

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy
      - name: Refresh ROS 2 apt source (handle key rotations)
        # The ros2-apt-source package installs the keyring and keeps it
        # up to date so future OSRF key rotations don't break apt-get.
        run: |
          set -euo pipefail
          codename=$(. /etc/os-release && echo "$VERSION_CODENAME")
          version=$(curl -sSL https://api.github.com/repos/ros-infrastructure/ros-apt-source/releases/latest \
            | grep -F '"tag_name"' | awk -F'"' '{print $4}')
          tmp=$(mktemp --suffix=.deb)
          curl -sSL -o "$tmp" \
            "https://github.com/ros-infrastructure/ros-apt-source/releases/download/${version}/ros2-apt-source_${version}.${codename}_all.deb"
          sudo apt-get install -y "$tmp"
          rm -f "$tmp"
          sudo apt-get update
      - name: Install ament lint tools
        run: |
          sudo apt-get install -y --no-install-recommends \
            ros-jazzy-ament-cmake-cppcheck \
            ros-jazzy-ament-cmake-cpplint \
            ros-jazzy-ament-cmake-lint-cmake \
            ros-jazzy-ament-cmake-copyright
      - name: Run pre-commit
        run: |
          source /opt/ros/jazzy/setup.bash
          pip install pre-commit
          pre-commit run --all-files --show-diff-on-failure

  ros_ci:
    name: ${{ matrix.ros_distro }} CI
    runs-on: ubuntu-latest
    container:
      image: rostooling/setup-ros-docker:ubuntu-${{ matrix.ubuntu_codename }}-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ros_distro: jazzy
            ubuntu_codename: noble
          - ros_distro: lyrical
            ubuntu_codename: resolute
          - ros_distro: rolling
            ubuntu_codename: resolute
    steps:
      - uses: actions/checkout@v7
      - uses: ros-tooling/action-ros-ci@v0.4
        id: action_ros_ci_step
        with:
          target-ros2-distro: ${{ matrix.ros_distro }}
          package-name: |
            linux_i2c_demos
            linux_i2c_devices
            linux_i2c_interface
